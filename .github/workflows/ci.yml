name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Read go.mod
      id: goversion
      run: echo "ver=$(grep '^go ' go.mod | awk '{print $2}')" >> $GITHUB_OUTPUT
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ steps.goversion.outputs.ver }}
    - name: Install dependencies
      run: go mod download
    - name: Run linter
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
    - name: Test
      run: go test -v ./...
