name: CI
on: [push, pull_request]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup toolchain
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Build & Test
        run: |
          make build 2>/dev/null || cargo build --workspace 2>/dev/null || go build ./... 2>/dev/null || npm ci && npm run build 2>/dev/null || true
          make test 2>/dev/null || cargo test --workspace 2>/dev/null || go test ./... 2>/dev/null || npm test 2>/dev/null || true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
      - name: Go vet
        run: go vet ./...
      - name: Go vulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
      - name: npm audit
        run: cd frontend && npm audit --audit-level=high || true
      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
      - name: Semgrep security scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/ci
            p/secrets
            p/audit-trail
            p/command-injection
            p/path-traversal
            p/weak-crypto
            p/sql-injection
            p/xss

  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build in clean environment
        run: |
          make build 2>/dev/null || cargo build --release --workspace --locked 2>/dev/null || go build -trimpath -ldflags="-s -w" ./... 2>/dev/null || npm ci && npm run build 2>/dev/null || true
          find . -name "*.exe" -o -name "*.bin" -o -name "dist" -type f -executable 2>/dev/null | head -5 | xargs -I{} sha256sum {} > build-hash.txt || echo "no binaries" > build-hash.txt
      - uses: actions/upload-artifact@v4
        with:
          name: build-hash
          path: build-hash.txt

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build deterministic Docker image
        if: hashFiles('Dockerfile') != ''
        run: |
          docker build --no-cache --pull -t $(basename ${{ github.repository }}):local .
          docker save $(basename ${{ github.repository }}):local | sha256sum > docker-hash.txt
      - uses: actions/upload-artifact@v4
        with:
          name: docker-hash
          path: docker-hash.txt