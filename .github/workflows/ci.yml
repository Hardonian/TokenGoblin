name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read go.mod
        id: goversion
        run: echo "ver=$(grep '^go ' go.mod | awk '{print $2}')" >> $GITHUB_OUTPUT
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.goversion.outputs.ver }}
      - name: Install Go dependencies
        run: go mod download
      - name: Run Go linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.4.0
      - name: Run Go tests
        run: go test -v ./...
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
