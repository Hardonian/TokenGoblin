version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=sqlite:///data/token_goblin.db
      # Stripe (required for billing)
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
      - STRIPE_PRICE_ENTERPRISE=${STRIPE_PRICE_ENTERPRISE}
      # Internal webhook secret (for Stripe webhook → Go API)
      - TG_INTERNAL_WEBHOOK_SECRET=${TG_INTERNAL_WEBHOOK_SECRET:-change-me-in-production}
    volumes:
      - token-goblin-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_TG_API_BASE=http://backend:8080
      - NEXT_PUBLIC_STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
      - NEXT_PUBLIC_STRIPE_PRICE_ENTERPRISE=${STRIPE_PRICE_ENTERPRISE}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  token-goblin-data: