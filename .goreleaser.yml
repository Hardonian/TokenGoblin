version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: token-goblin
    main: ./cmd/server
    binary: token-goblin
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    hooks:
      post:
        - ./scripts/sign-artifact.sh {{.Path}}

archives:
  - format: tar.gz
    name_template: >-
      {{.ProjectName}}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{.Arch}}{{- end}}
      {{- if .Arm }}v{{.Arm}}{{- end}}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: Hardonian
    name: TokenGoblin
  draft: false
  prerelease: auto