run:
  timeout: 10m
  issues-exit-code: 1
  tests: true

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - errorlint
    - goconst
    - gocritic
    - gocyclo
    - misspell
    - noctx
    - prealloc
    - unconvert
    - unparam

  disable-all: false

linters-settings:
  gosec:
    excludes:
      - G104 # Error not checked
      - G204 # Subprocess call
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - hugeParam
  govet:
    enable-all: true
    disable:
      - fieldalignment

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - gocritic

  max-issues-per-linter: 0
  max-same-issues: 0

severity:
  default-severity: error
